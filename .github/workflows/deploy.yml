# Deploy on push to main: CI (MongoDB + generated secrets), build Docker, push ECR, deploy to EC2 with health check and rollback.
# GitHub secrets: EC2_SSH_PRIVATE_KEY, EC2_HOST, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, ECR_REPOSITORY (repo name).
# Optional: EC2_USER, EC2_PORT, APP_DIR, APP_PORT. App env (production) lives only on EC2 in .env.
name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: '7.0'

      - name: Generate CI secrets
        id: secrets
        run: |
          echo "db_name=lexora_deploy_${{ github.run_id }}" >> $GITHUB_OUTPUT
          openssl genrsa -out /tmp/jwt_private.pem 2048
          openssl rsa -in /tmp/jwt_private.pem -pubout -out /tmp/jwt_public.pem
          echo "jwt_private_b64<<DELIM_JWT_PRIV" >> $GITHUB_OUTPUT
          base64 -w0 < /tmp/jwt_private.pem >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "DELIM_JWT_PRIV" >> $GITHUB_OUTPUT
          echo "jwt_public_b64<<DELIM_JWT_PUB" >> $GITHUB_OUTPUT
          base64 -w0 < /tmp/jwt_public.pem >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "DELIM_JWT_PUB" >> $GITHUB_OUTPUT
          echo "test_email=test-$(openssl rand -hex 8)@example.com" >> $GITHUB_OUTPUT
          echo "test_password=$(openssl rand -base64 16)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          NODE_ENV: test
          DATABASE_URI: mongodb://127.0.0.1:27017/${{ steps.secrets.outputs.db_name }}
          JWT_ACCESS_TOKEN_SECRET_PRIVATE: ${{ steps.secrets.outputs.jwt_private_b64 }}
          JWT_ACCESS_TOKEN_SECRET_PUBLIC: ${{ steps.secrets.outputs.jwt_public_b64 }}
          TEST_USER_EMAIL: ${{ steps.secrets.outputs.test_email }}
          TEST_USER_PASSWORD: ${{ steps.secrets.outputs.test_password }}
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "::error::Build failed: dist/index.js not found"
            exit 1
          fi

      - name: Smoke
        env:
          NODE_ENV: test
          PORT: 666
          DATABASE_URI: mongodb://127.0.0.1:27017/${{ steps.secrets.outputs.db_name }}
          JWT_ACCESS_TOKEN_SECRET_PRIVATE: ${{ steps.secrets.outputs.jwt_private_b64 }}
          JWT_ACCESS_TOKEN_SECRET_PUBLIC: ${{ steps.secrets.outputs.jwt_public_b64 }}
        run: node scripts/smoke.js

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR registry and ensure repository exists
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ secrets.AWS_REGION }}"
          REPO="${{ secrets.ECR_REPOSITORY }}"
          REGISTRY="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com"
          aws ecr describe-repositories --repository-names "${REPO}" --region "${REGION}" 2>/dev/null || \
            aws ecr create-repository --repository-name "${REPO}" --region "${REGION}"
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY}/${REPO}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.ecr.outputs.image }} .
          docker push ${{ steps.ecr.outputs.image }}

      - name: Deploy to EC2 (health check + rollback)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_PORT: ${{ secrets.APP_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          ECR_IMAGE: ${{ steps.ecr.outputs.image }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -e
          trap 'rm -f ~/.ssh/deploy_key' EXIT
          EC2_USER="${EC2_USER:-ec2-user}"
          EC2_PORT="${EC2_PORT:-22}"
          APP_DIR="${APP_DIR:-/home/ec2-user/lexora}"
          APP_PORT="${APP_PORT:-8080}"
          ENV_FILE="${APP_DIR}/.env"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -P "$EC2_PORT" \
            scripts/deploy-ec2.sh \
            $EC2_USER@$EC2_HOST:/tmp/deploy-ec2.sh
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "$EC2_PORT" \
            $EC2_USER@$EC2_HOST \
            "chmod +x /tmp/deploy-ec2.sh && \
             export ECR_IMAGE='$ECR_IMAGE' APP_PORT='$APP_PORT' ENV_FILE='$ENV_FILE' HEALTH_DELAY_SEC=3 AWS_REGION='$AWS_REGION' && \
             /tmp/deploy-ec2.sh"
