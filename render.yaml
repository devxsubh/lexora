services:
  - type: web
    name: lexora-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run render:start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: PORT
        sync: false
