services:
  - type: web
    name: lexora-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: PORT
        sync: false
